<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galerie — Le Traiteur Libanais</title>
  <meta name="description" content="Découvrez nos créations culinaires et nos événements. Galerie photo des mezzés, buffets, verrines et événements du Traiteur Libanais." />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />

  <style>
    /* Galerie-specific styles */
    .galerie-filters {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .galerie-filters button {
      padding: 0.75rem 1.5rem;
      border: 2px solid var(--gold);
      background: transparent;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 4px;
    }

    .galerie-filters button:hover {
      background: var(--gold);
      color: white;
    }

    .galerie-filters button.active {
      background: var(--gold);
      color: white;
    }

    .galerie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .galerie-item {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      aspect-ratio: 1 / 1;
      background: var(--bg-secondary);
    }

    .galerie-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .galerie-item:hover img {
      transform: scale(1.05);
    }

    .galerie-item-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      cursor: pointer;
    }

    .galerie-item:hover .galerie-item-overlay {
      opacity: 1;
    }

    .galerie-item-overlay::before {
      content: "🔍";
      font-size: 2.5rem;
      color: white;
    }

    /* Lightbox styles */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-close {
      position: absolute;
      top: 2rem;
      right: 2rem;
      background: none;
      border: none;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.2s ease;
      z-index: 1001;
    }

    .lightbox-close:hover {
      transform: scale(1.2);
    }

    #lightboxImg {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
    }

    @media (max-width: 768px) {
      .galerie-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1.5rem;
      }

      .galerie-filters {
        gap: 0.5rem;
      }

      .galerie-filters button {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

  <!-- ===== LIGHTBOX ===== -->

  <!-- Main JS -->
